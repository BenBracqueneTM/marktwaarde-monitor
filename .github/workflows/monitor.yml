name: MarktWaarde Live Monitor

on:
  schedule:
    # Hourly at :23, 06:00–19:00 UTC (14 runs/day).
    # Covers ~08:00–20:00 Belgian local in summer (CEST, UTC+2) and
    # ~07:00–20:00 in winter (CET, UTC+1). Cron is UTC-only and does NOT
    # follow daylight saving, so this window drifts by one hour across the
    # spring/autumn clock changes — harmless for busyness tracking.
    # :23 (not :00) dodges the congested top-of-hour slot.
    - cron: '23 6-19 * * *'
  workflow_dispatch:          # lets you trigger a run by hand from the Actions tab

permissions:
  contents: write             # required so the job can commit the updated log back

concurrency:
  group: marktwaarde-monitor
  cancel-in-progress: false   # queue runs instead of overlapping them (avoids push clashes)

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests          # the monitor only needs requests (no folium)

      - name: Run monitor
        env:
          BESTTIME_API_KEY: ${{ secrets.BESTTIME_API_KEY }}
        run: python marktwaarde_monitor.py

      - name: Commit updated log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marktwaarde_live_log.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Live log update: $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
