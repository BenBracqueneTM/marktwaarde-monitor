name: MarktWaarde Live Monitor

on:
  # Triggered externally by cron-job.org for punctual scheduling. cron-job.org
  # sends a repository_dispatch API call with event_type "poll" on its schedule.
  # GitHub's own `schedule:` cron is intentionally NOT used (it runs late or
  # drops occurrences). repository_dispatch is also exempt from the 60-day
  # auto-disable that applies to scheduled workflows.
  repository_dispatch:
    types: [poll]
  workflow_dispatch:          # manual "Run workflow" button in the Actions tab

permissions:
  contents: write             # lets the job commit the updated log back

concurrency:
  group: marktwaarde-monitor
  cancel-in-progress: false   # queue runs instead of overlapping them

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests          # the monitor only needs requests

      - name: Run monitor
        env:
          BESTTIME_API_KEY: ${{ secrets.BESTTIME_API_KEY }}
        run: python marktwaarde_monitor.py

      - name: Commit updated log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marktwaarde_live_log.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Live log update: $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
